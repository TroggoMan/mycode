---
- name: Exploring the template module and jinja expressions
  hosts: planetexpress
  gather_facts: no
  connection: ssh


  vars_files:
    - vars/planetexpress.yml

  tasks:
    - name: Configure spaceship registration
      template:
        src: ~/mycode/templates/ship.cfg.j2
        dest: ~/ship.cfg

    - name: Configure mission orders
      template:
        src: ~/mycode/templates/mission-orders.txt.j2
        dest: ~/mission-orders.txt
